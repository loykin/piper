name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./...

      - name: Run e2e tests
        run: go test -tags=e2e -v -timeout=120s ./...

  binary-e2e:
    name: Binary E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build piper CLI
        run: go build -o bin/piper ./cmd/piper

      - name: Run binary e2e tests
        run: go test -tags=binary_e2e -v -timeout=120s .

  docker-notebook-e2e:
    name: Docker Notebook E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Pull notebook image
        run: docker pull jupyter/minimal-notebook:latest

      - name: Run Docker notebook e2e
        run: |
          PIPER_NOTEBOOK_DOCKER_E2E_IMAGE=jupyter/minimal-notebook:latest \
            go test ./pkg/workers/baremetal/notebook -run TestDockerRuntimeE2E_StartStopNotebook -v -timeout=3m

  examples-e2e:
    name: Examples E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run examples e2e (library, bare-metal, YAML parsing)
        run: go test -tags=example_e2e -v -timeout=120s ./examples/

  build-image:
    name: Build Image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.push.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build linux binary
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/piper ./cmd/piper

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: push
        run: |
          IMAGE=ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  k8s-e2e:
    name: K8s E2E
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
          chmod +x ./kind && sudo mv ./kind /usr/local/bin/kind

      - name: Create kind cluster
        run: kind create cluster --wait=60s

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load images into kind
        run: |
          docker pull "${{ needs.build-image.outputs.image }}"
          kind load docker-image "${{ needs.build-image.outputs.image }}"
          docker pull alpine:3.20
          kind load docker-image alpine:3.20
          docker pull chrislusf/seaweedfs:latest
          kind load docker-image chrislusf/seaweedfs:latest
          docker pull public.ecr.aws/aws-cli/aws-cli:latest
          kind load docker-image public.ecr.aws/aws-cli/aws-cli:latest
          docker pull python:3.12-slim
          kind load docker-image python:3.12-slim
          docker pull jupyter/minimal-notebook:latest
          kind load docker-image jupyter/minimal-notebook:latest

      - name: Run K8s E2E tests
        run: |
          PIPER_K8S_E2E_IMAGE=${{ needs.build-image.outputs.image }} \
          PIPER_K8S_E2E_NOTEBOOK_IMAGE=jupyter/minimal-notebook:latest \
            go test -tags=k8s_e2e -v -timeout=60m -run 'TestK8sE2E' .

  cleanup-images:
    name: Cleanup Images
    runs-on: ubuntu-latest
    needs: k8s-e2e
    if: github.event_name == 'push'
    permissions:
      packages: write
    steps:
      - name: Keep latest 5 GHCR images
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: container
          min-versions-to-keep: 5
          token: ${{ secrets.GITHUB_TOKEN }}

  example-e2e:
    name: Example E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run example e2e tests
        run: go test -tags=example_e2e -v -timeout=120s ./examples/

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build piper CLI
        run: go build ./cmd/piper
