name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./...

      - name: Run e2e tests
        run: go test -tags=e2e -v -timeout=120s ./...

  binary-e2e:
    name: Binary E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build piper CLI
        run: go build -o bin/piper ./cmd/piper

      - name: Run binary e2e tests
        run: go test -tags=binary_e2e -v -timeout=120s .

  docker-notebook-e2e:
    name: Docker Notebook E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Pull notebook image
        run: docker pull jupyter/minimal-notebook:latest

      - name: Run Docker notebook e2e
        run: |
          PIPER_NOTEBOOK_DOCKER_E2E_IMAGE=jupyter/minimal-notebook:latest \
            go test ./pkg/notebook/worker -run '^TestDockerRuntimeE2E_' -v -count=1 -timeout=6m

  process-notebook-e2e:
    name: Process Notebook E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download dependencies
        run: go mod download

      - name: Install Jupyter environment
        run: |
          python -m venv /tmp/piper-jupyter-e2e
          /tmp/piper-jupyter-e2e/bin/pip install --quiet jupyterlab ipykernel

      - name: Run process notebook e2e
        run: |
          PIPER_NOTEBOOK_PROCESS_E2E=1 \
          PIPER_NOTEBOOK_PROCESS_E2E_ENV=/tmp/piper-jupyter-e2e \
            go test ./pkg/notebook/worker -run '^TestProcessRuntimeE2E_' -v -count=1 -timeout=6m

  docker-serving-e2e:
    name: Docker Serving E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Pull serving image
        run: docker pull python:3.12-slim

      - name: Run Docker serving e2e
        run: |
          PIPER_SERVING_DOCKER_E2E_IMAGE=python:3.12-slim \
            go test ./pkg/serving/worker/driver/docker/ \
              -run '^TestServingDockerE2E_DeployStopCrashRecover$' \
              -v -count=1 -timeout=5m

  process-serving-e2e:
    name: Process Serving E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run process serving e2e
        run: |
          PIPER_SERVING_PROCESS_E2E=1 \
            go test ./pkg/serving/worker/driver/process/ \
              -run '^TestServingProcessE2E_DeployStopCrashRecover$' \
              -v -count=1 -timeout=5m

  examples-e2e:
    name: Examples E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download dependencies
        run: go mod download

      - name: Install pipeline notebook environment
        run: |
          python -m venv /tmp/piper-pipeline-template-e2e
          /tmp/piper-pipeline-template-e2e/bin/pip install --quiet papermill ipykernel setuptools

      - name: Run examples e2e (library, bare-metal, YAML parsing)
        run: |
          PIPER_PIPELINE_TEMPLATE_E2E_ENV=/tmp/piper-pipeline-template-e2e \
            go test -tags=example_e2e -v -timeout=5m ./examples/

  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Go dependencies
        run: go mod download

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Install pipeline notebook environment
        run: |
          python -m venv /tmp/piper-pipeline-template-e2e
          /tmp/piper-pipeline-template-e2e/bin/pip install --quiet papermill ipykernel setuptools

      - name: Run frontend E2E
        working-directory: frontend
        env:
          PIPER_PIPELINE_TEMPLATE_E2E_ENV: /tmp/piper-pipeline-template-e2e
        run: pnpm test:e2e

  k8s-e2e:
    name: K8s E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
          chmod +x ./kind && sudo mv ./kind /usr/local/bin/kind

      - name: Create kind cluster
        run: kind create cluster --wait=60s

      - name: Build linux binary
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/piper-amd64 ./cmd/piper

      - name: Build piper image locally
        run: docker build --build-arg TARGETARCH=amd64 -t piper/piper:e2e .

      - name: Load images into kind
        run: |
          kind load docker-image piper/piper:e2e
          docker pull alpine:3.20
          kind load docker-image alpine:3.20
          docker pull chrislusf/seaweedfs:latest
          kind load docker-image chrislusf/seaweedfs:latest
          docker pull public.ecr.aws/aws-cli/aws-cli:latest
          kind load docker-image public.ecr.aws/aws-cli/aws-cli:latest
          docker pull python:3.12-slim
          kind load docker-image python:3.12-slim
          docker pull jupyter/minimal-notebook:latest
          kind load docker-image jupyter/minimal-notebook:latest

      - name: Run K8s E2E tests
        # PIPER_K8S_E2E_IMAGE can be overridden to test the published GHCR image:
        #   PIPER_K8S_E2E_IMAGE=ghcr.io/<owner>/piper:latest
        run: |
          PIPER_K8S_E2E_IMAGE=piper/piper:e2e \
          PIPER_K8S_E2E_NOTEBOOK_IMAGE=jupyter/minimal-notebook:latest \
            go test -tags=k8s_e2e -v -timeout=60m -run 'TestK8sE2E' .

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build piper CLI
        run: go build ./cmd/piper

  # Runs only on master push, after every other job passes.
  # Produces ghcr.io/<owner>/piper:latest and :sha-<sha> for k8s e2e testing.
  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    needs:
      - test
      - binary-e2e
      - docker-notebook-e2e
      - process-notebook-e2e
      - docker-serving-e2e
      - process-serving-e2e
      - examples-e2e
      - frontend-e2e
      - k8s-e2e
      - build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build linux binary
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags="-s -w" -o bin/piper-amd64 ./cmd/piper

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          IMAGE_BASE=ghcr.io/${{ github.repository_owner }}/piper
          docker build --build-arg TARGETARCH=amd64 \
            -t "${IMAGE_BASE}:latest" \
            -t "${IMAGE_BASE}:sha-${{ github.sha }}" \
            .
          docker push "${IMAGE_BASE}:latest"
          docker push "${IMAGE_BASE}:sha-${{ github.sha }}"

      - name: Keep latest 10 GHCR images
        uses: actions/delete-package-versions@v5
        with:
          package-name: piper
          package-type: container
          min-versions-to-keep: 10
          token: ${{ secrets.GITHUB_TOKEN }}
