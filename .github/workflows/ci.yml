name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./...

      - name: Run e2e tests
        run: go test -tags=e2e -v -timeout=120s ./...

  binary-e2e:
    name: Binary E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build piper CLI
        run: go build -o bin/piper ./cmd/piper

      - name: Run binary e2e tests
        run: go test -tags=binary_e2e -v -timeout=120s .

  docker-notebook-e2e:
    name: Docker Notebook E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Pull notebook image
        run: docker pull jupyter/minimal-notebook:latest

      - name: Run Docker notebook e2e
        run: |
          PIPER_NOTEBOOK_DOCKER_E2E_IMAGE=jupyter/minimal-notebook:latest \
            go test ./pkg/workers/baremetal/notebook -run '^TestDockerRuntimeE2E_' -v -count=1 -timeout=6m

  process-notebook-e2e:
    name: Process Notebook E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download dependencies
        run: go mod download

      - name: Install Jupyter environment
        run: |
          python -m venv /tmp/piper-jupyter-e2e
          /tmp/piper-jupyter-e2e/bin/pip install --quiet jupyterlab ipykernel

      - name: Run process notebook e2e
        run: |
          PIPER_NOTEBOOK_PROCESS_E2E=1 \
          PIPER_NOTEBOOK_PROCESS_E2E_ENV=/tmp/piper-jupyter-e2e \
            go test ./pkg/workers/baremetal/notebook -run '^TestProcessRuntimeE2E_' -v -count=1 -timeout=6m

  examples-e2e:
    name: Examples E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download dependencies
        run: go mod download

      - name: Install pipeline notebook environment
        run: |
          python -m venv /tmp/piper-pipeline-template-e2e
          /tmp/piper-pipeline-template-e2e/bin/pip install --quiet papermill ipykernel setuptools

      - name: Run examples e2e (library, bare-metal, YAML parsing)
        run: |
          PIPER_PIPELINE_TEMPLATE_E2E_ENV=/tmp/piper-pipeline-template-e2e \
            go test -tags=example_e2e -v -timeout=5m ./examples/

  k8s-e2e:
    name: K8s E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
          chmod +x ./kind && sudo mv ./kind /usr/local/bin/kind

      - name: Create kind cluster
        run: kind create cluster --wait=60s

      - name: Build linux binary
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/piper ./cmd/piper

      - name: Build piper image locally
        run: docker build -t piper/piper:e2e .

      - name: Load images into kind
        run: |
          kind load docker-image piper/piper:e2e
          docker pull alpine:3.20
          kind load docker-image alpine:3.20
          docker pull chrislusf/seaweedfs:latest
          kind load docker-image chrislusf/seaweedfs:latest
          docker pull public.ecr.aws/aws-cli/aws-cli:latest
          kind load docker-image public.ecr.aws/aws-cli/aws-cli:latest
          docker pull python:3.12-slim
          kind load docker-image python:3.12-slim
          docker pull jupyter/minimal-notebook:latest
          kind load docker-image jupyter/minimal-notebook:latest

      - name: Run K8s E2E tests
        run: |
          PIPER_K8S_E2E_IMAGE=piper/piper:e2e \
          PIPER_K8S_E2E_NOTEBOOK_IMAGE=jupyter/minimal-notebook:latest \
            go test -tags=k8s_e2e -v -timeout=60m -run 'TestK8sE2E' .

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build piper CLI
        run: go build ./cmd/piper
