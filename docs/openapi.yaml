openapi: 3.1.0
info:
  title: piper API
  version: 0.1.0
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /health:
    get:
      security: []
      responses:
        "200":
          description: Server health.
  /events:
    get:
      responses:
        "200":
          description: Server-sent event stream for run, step, schedule, worker, and service events.
          content:
            text/event-stream:
              schema:
                type: string
  /api/projects/{project_id}/credentials:
    get:
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Project credential metadata. Secret values are never returned.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Credential" }
    post:
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCredentialRequest" }
      responses:
        "201":
          description: Created credential metadata.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Credential" }
        "409":
          description: Credential already exists.
  /api/projects/{project_id}/credentials/{name}:
    get:
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - $ref: "#/components/parameters/CredentialName"
      responses:
        "200":
          description: Project credential metadata.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Credential" }
        "404":
          description: Credential not found.
    patch:
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - $ref: "#/components/parameters/CredentialName"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatchCredentialRequest" }
      responses:
        "200":
          description: Credential metadata updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Credential" }
        "404":
          description: Credential not found.
    delete:
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - $ref: "#/components/parameters/CredentialName"
      responses:
        "204":
          description: Credential deleted.
        "404":
          description: Credential not found.
  /api/projects/{project_id}/credentials/{name}/rotate:
    post:
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - $ref: "#/components/parameters/CredentialName"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RotateCredentialRequest" }
      responses:
        "204":
          description: Credential value rotated.
        "404":
          description: Credential not found.
        "409":
          description: Credential is disabled.
  /api/projects/{project_id}/credentials/{name}/test:
    post:
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - $ref: "#/components/parameters/CredentialName"
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TestCredentialRequest" }
      responses:
        "200":
          description: Credential test succeeded.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TestCredentialResult" }
        "502":
          description: Credential test failed.
  /runs:
    get:
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: pipeline_name
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Runs with embedded step summaries.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RunWithSteps" }
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [yaml]
              properties:
                yaml: { type: string }
                owner_id: { type: string }
                params: { type: object, additionalProperties: true }
                vars: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Created run id.
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { type: string }
  /runs/{id}:
    get:
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Run detail.
          content:
            application/json:
              schema:
                type: object
                properties:
                  run: { $ref: "#/components/schemas/Run" }
                  steps:
                    type: array
                    items: { $ref: "#/components/schemas/Step" }
    delete:
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "204":
          description: Deleted.
  /runs/{id}/cancel:
    post:
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Run canceled.
  /runs/{id}/artifacts:
    get:
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Artifact tree.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/StepArtifacts" }
  /runs/{id}/steps/{step}/logs:
    get:
      parameters:
        - $ref: "#/components/parameters/RunID"
        - name: step
          in: path
          required: true
          schema: { type: string }
        - name: after
          in: query
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Step logs.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LogLine" }
  /schedules:
    get:
      responses:
        "200":
          description: Schedules.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Schedule" }
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, yaml, type]
              properties:
                name: { type: string }
                yaml: { type: string }
                type: { type: string, enum: [immediate, once, cron] }
                cron: { type: string }
                run_at: { type: string, format: date-time }
                owner_id: { type: string }
                params: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Created schedule id.
  /schedules/{id}:
    get:
      parameters:
        - $ref: "#/components/parameters/ScheduleID"
      responses:
        "200":
          description: Schedule detail.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Schedule" }
    patch:
      parameters:
        - $ref: "#/components/parameters/ScheduleID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        "200":
          description: Enabled flag updated.
    delete:
      parameters:
        - $ref: "#/components/parameters/ScheduleID"
      responses:
        "204":
          description: Deleted.
  /api/workers:
    get:
      responses:
        "200":
          description: Connected workers.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Worker" }
  /services:
    get:
      responses:
        "200":
          description: Deployed services.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Service" }
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [yaml]
              properties:
                yaml: { type: string }
      responses:
        "200":
          description: Deployed service.
  /services/{name}:
    get:
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Service detail.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Service" }
    delete:
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Stopped and deleted.
  /services/{name}/restart:
    post:
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Restarted.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    ProjectID:
      name: project_id
      in: path
      required: true
      schema: { type: string }
    CredentialName:
      name: name
      in: path
      required: true
      schema: { type: string }
    RunID:
      name: id
      in: path
      required: true
      schema: { type: string }
    ScheduleID:
      name: id
      in: path
      required: true
      schema: { type: string }
  schemas:
    Credential:
      type: object
      properties:
        name: { type: string }
        kind: { type: string, enum: [generic, git, s3] }
        endpoint: { type: string }
        keys:
          type: array
          items: { type: string }
        disabled: { type: boolean }
        last_used_at: { type: string, format: date-time }
        last_tested_at: { type: string, format: date-time }
        last_test_ok: { type: boolean }
        last_test_message: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CreateCredentialRequest:
      type: object
      required: [name, kind, data]
      properties:
        name: { type: string }
        kind: { type: string, enum: [generic, git, s3] }
        endpoint: { type: string }
        data:
          type: object
          additionalProperties: { type: string }
    RotateCredentialRequest:
      type: object
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: { type: string }
    PatchCredentialRequest:
      type: object
      properties:
        enabled: { type: boolean }
        endpoint: { type: string }
    TestCredentialRequest:
      type: object
      properties:
        repo: { type: string }
    TestCredentialResult:
      type: object
      properties:
        ok: { type: boolean }
        message: { type: string }
    Run:
      type: object
      properties:
        id: { type: string }
        schedule_id: { type: string }
        owner_id: { type: string }
        pipeline_name: { type: string }
        status: { type: string, enum: [scheduled, running, success, failed, canceled] }
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time }
        scheduled_at: { type: string, format: date-time }
        pipeline_yaml: { type: string }
    RunWithSteps:
      allOf:
        - $ref: "#/components/schemas/Run"
        - type: object
          properties:
            steps:
              type: array
              items: { $ref: "#/components/schemas/Step" }
    Step:
      type: object
      properties:
        run_id: { type: string }
        step_name: { type: string }
        status: { type: string }
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time }
        attempts: { type: integer }
        error: { type: string }
    Schedule:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        owner_id: { type: string }
        pipeline_yaml: { type: string }
        schedule_type: { type: string, enum: [immediate, once, cron] }
        cron_expr: { type: string }
        enabled: { type: boolean }
        last_run_at: { type: string, format: date-time }
        next_run_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Worker:
      type: object
      required: [id, infrastructure, capabilities, registered_at, last_seen]
      properties:
        id: { type: string }
        infrastructure: { type: string, enum: [baremetal, docker, k8s] }
        capabilities:
          type: array
          items: { type: string, enum: [pipeline, notebook, serving] }
        hostname: { type: string }
        cluster_name: { type: string }
        namespaces:
          type: array
          items: { type: string }
        labels:
          type: object
          additionalProperties: { type: string }
        capacity: { type: integer }
        registered_at: { type: string, format: date-time }
        last_seen: { type: string, format: date-time }
    Service:
      type: object
      properties:
        name: { type: string }
        owner_id: { type: string }
        run_id: { type: string }
        artifact: { type: string }
        status: { type: string, enum: [running, stopped, failed] }
        endpoint: { type: string }
        pid: { type: integer }
        yaml: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    LogLine:
      type: object
      properties:
        id: { type: integer, format: int64 }
        run_id: { type: string }
        step_name: { type: string }
        ts: { type: string, format: date-time }
        stream: { type: string, enum: [stdout, stderr] }
        line: { type: string }
    StepArtifacts:
      type: object
      properties:
        step: { type: string }
        artifacts:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              files:
                type: array
                items:
                  type: object
                  properties:
                    path: { type: string }
                    size: { type: integer, format: int64 }
                    modified_at: { type: string, format: date-time }
    ModelService:
      type: object
      properties:
        apiVersion: { type: string }
        kind: { type: string }
        metadata:
          type: object
          properties:
            name: { type: string }
        spec:
          type: object
          properties:
            model:
              type: object
              properties:
                from_artifact:
                  type: object
                  properties:
                    pipeline: { type: string }
                    step: { type: string }
                    artifact: { type: string }
                    run: { type: string }
                from_uri:
                  type: string
                  description: file://, http://, https://, or s3:// model location.
