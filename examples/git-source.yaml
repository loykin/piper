# git source 예제
#
# GitHub 레포에서 스크립트를 직접 가져와 실행한다.
# run.source: git  →  GitFetcher가 shallow clone 후 fetchDir에서 커맨드 실행
# PIPER_SCRIPT_PATH 환경변수로 fetch된 파일의 절대경로를 참조할 수 있다.
#
# source가 풀리는 위치:
#   run.dir 미설정  →  {SourceDir}/{step 이름}/
#   run.dir 설정    →  {SourceDir}/{dir}/
#
# SourceDir은 runner/worker 실행 시 --source-dir 플래그로 지정.
# 미설정 시 {WorkDir}/_source 가 기본값.
#
# 선택적 환경 변수 (private repo):
#   PIPER_GIT_TOKEN=<personal access token>
#   PIPER_GIT_USER=<username>

apiVersion: piper/v1
kind: Pipeline

metadata:
  name: git-source-example
  description: "GitHub 레포에서 Python 스크립트를 가져와 실행"

spec:
  steps:

  # dir 미설정 — {SourceDir}/train/ 에 clone됨
  - name: train
    run:
      source: git
      repo: https://github.com/loykin/piper
      branch: master
      path: examples/scripts/train.py
      command: ["python", "examples/scripts/train.py"]
    params:
      epochs: 5
      lr: 0.001

  # dir 설정 — 같은 레포를 다른 이름으로 clone해 격리
  - name: train-v2
    run:
      source: git
      repo: https://github.com/loykin/piper
      branch: master
      path: examples/scripts/train.py
      dir: model-v2          # {SourceDir}/model-v2/ 에 clone됨
      command: ["python", "examples/scripts/train.py"]
    params:
      epochs: 10
      lr: 0.0001
    depends_on: [train]
