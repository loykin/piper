# git source example
#
# Fetches scripts directly from a GitHub repository and executes them.
# run.source: git  →  GitFetcher performs a shallow clone then runs the command from fetchDir
# The absolute path of the fetched file is available via the PIPER_SCRIPT_PATH env var.
#
# Where sources are checked out:
#   run.dir not set  →  {SourceDir}/{step name}/
#   run.dir set      →  {SourceDir}/{dir}/
#
# SourceDir is specified via the --source-dir flag when running runner/worker.
# Defaults to {WorkDir}/_source if not set.
#
# Optional env vars (private repo):
#   PIPER_GIT_TOKEN=<personal access token>
#   PIPER_GIT_USER=<username>

apiVersion: piper/v1
kind: Pipeline

metadata:
  name: git-source-example
  description: "Fetch and run a Python script from a GitHub repository"

spec:
  steps:

  # dir not set — cloned into {SourceDir}/train/
  - name: train
    run:
      source: git
      repo: https://github.com/loykin/piper
      branch: master
      path: examples/scripts/train.py
      command: ["python", "examples/scripts/train.py"]
    params:
      epochs: 5
      lr: 0.001

  # dir set — clone the same repo under a different name for isolation
  - name: train-v2
    run:
      source: git
      repo: https://github.com/loykin/piper
      branch: master
      path: examples/scripts/train.py
      dir: model-v2          # cloned into {SourceDir}/model-v2/
      command: ["python", "examples/scripts/train.py"]
    params:
      epochs: 10
      lr: 0.0001
    depends_on: [train]
