# K8s execution example
#
# When k8s.worker is enabled and a k8s-worker is connected, each step runs in a separate Pod.
# Each step can use a different container image.
#
# Server configuration (piper.yaml):
#   k8s:
#     worker: true
#
# Run:
#   piper server --config piper.yaml
#   piper k8s-worker --master=http://piper-server:8080 --cluster=dev --pipeline-worker-image=piper/piper:latest --default-image=alpine:3.20

apiVersion: piper/v1
kind: Pipeline

metadata:
  name: k8s-pipeline

spec:
  steps:
  - name: extract
    runner:
      image: python:3.12-slim    # This step runs with the Python image
    run:
      type: command
      command:
        - python3
        - -c
        - |
          import json, os
          data = [{"id": i, "value": i * 10} for i in range(5)]
          out = os.environ["PIPER_OUTPUT_DIR"]
          with open(f"{out}/data.json", "w") as f:
              json.dump(data, f)
          print(f"extracted {len(data)} records")
    outputs:
      - name: raw-data
        path: data.json

  - name: transform
    runner:
      image: alpine:3.20         # This step runs with Alpine
    run:
      type: command
      command:
        - sh
        - -c
        - |
          echo "transforming data..."
          cat $PIPER_INPUT_DIR/raw-data/data.json
    depends_on: [extract]
    inputs:
      - name: raw-data
        from: extract/raw-data
