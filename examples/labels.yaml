# Worker label routing example
#
# Specifies which worker to use for each step.
# Steps without a label can run on any worker.
#
# Start workers:
#   go run ./examples/worker --label=gpu
#   go run ./examples/worker --label=cpu

apiVersion: piper/v1
kind: Pipeline

metadata:
  name: label-routing

spec:
  steps:
  - name: preprocess
    runner:
      label: cpu        # Run on CPU worker
    run:
      type: command
      command: ["sh", "-c", "echo 'preprocessing on CPU worker'"]

  - name: train
    runner:
      label: gpu        # Run on GPU worker
    run:
      type: command
      command: ["sh", "-c", "echo 'training on GPU worker'"]
    depends_on: [preprocess]

  - name: report
    # No label → any worker can run this
    run:
      type: command
      command: ["sh", "-c", "echo 'generating report'"]
    depends_on: [train]
