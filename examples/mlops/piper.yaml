# Piper server configuration
# Pass with: piper --config examples/full-mlops/piper.yaml serve

version: 1

server:
  http_addr: :8080
  run:
    output_dir: ./piper-outputs
    concurrency: 4
  retention:
    artifact_ttl: 168h  # delete S3 artifacts older than 7 days

storage:
  url: s3://piper-artifacts?endpoint=http://localhost:8333&s3ForcePathStyle=true&accessKey=piperadmin&secretKey=piperadmin
