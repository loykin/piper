# piper.yaml snippet — K8s notebook worker configuration.
# notebook_k8s.pod_defaults is applied to every notebook pod as a baseline
# (equivalent to a Kubeflow PodDefault). Per-notebook spec.k8s.pod_template
# is merged on top; piper required fields are always applied last.

version: 1
workers:
  common:
    master_url: http://piper-server:8080
    agent_addr: piper-server:9090
  k8s:
    cluster: production
    namespaces: [ml-notebooks]
    enabled: [notebook]
    in_cluster: true
    notebook:
      namespace: ml-notebooks
      image: jupyter/minimal-notebook:latest
      storage_class: standard
      storage_size: 10Gi

      pod_defaults:
        metadata:
          labels:
            managed-by: piper
        spec:
          nodeSelector:
            accelerator: gpu
          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule
          containers:
            - name: notebook
              resources:
                requests:
                  cpu: "2"
                  memory: 4Gi
