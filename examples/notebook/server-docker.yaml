apiVersion: piper/v1
kind: NotebookServer

metadata:
  name: my-notebook

spec:
  # placement pins this notebook to a specific registered worker.
  # Omit to let piper pick any available notebook worker.
  placement:
    worker: gpu-server-1

  # Docker Compose service format.
  docker:
    image: jupyter/scipy-notebook:latest
    cpus: "4"
    mem_limit: "8g"
    shm_size: "1g"

    # Named volumes declared in the worker's piper.yaml worker.docker.volumes.
    volumes:
      - datasets

    # GPU access via Docker Compose deploy.resources (requires nvidia-container-toolkit).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: "1"          # "all" to expose every GPU
              capabilities: [gpu]
