apiVersion: piper/v1
kind: NotebookServer

metadata:
  name: my-notebook

spec:
  volume:
    storage_class: standard
    size: 20Gi
  driver:
    placement:
      runtime: k8s
    k8s:
      namespace: piper-notebooks
      image: jupyter/scipy-notebook:latest

    # pod_template is a standard Kubernetes PodTemplateSpec.
    # The notebook container must be named "notebook".
    pod_template:
      metadata:
        labels:
          team: ml
        annotations:
          notebooks.example.com/owner: alice
      spec:
        nodeSelector:
          accelerator: nvidia
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        containers:
          - name: notebook
            resources:
              limits:
                nvidia.com/gpu: "1"
                memory: 16Gi
              requests:
                cpu: "4"
                memory: 8Gi
