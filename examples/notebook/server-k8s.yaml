apiVersion: piper/v1
kind: NotebookServer

metadata:
  name: my-notebook

spec:
  k8s:
    image: jupyter/scipy-notebook:latest  # overrides server-level worker_image
    storage_class: standard               # PVC storage class; omit for cluster default
    storage_size: 20Gi

    # pod_template is a standard Kubernetes PodTemplateSpec.
    # The notebook container must be named "notebook".
    # These fields are merged on top of the server-level pod_defaults.
    pod_template:
      metadata:
        labels:
          team: ml
        annotations:
          notebooks.example.com/owner: alice
      spec:
        nodeSelector:
          accelerator: nvidia
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        containers:
          - name: notebook
            resources:
              limits:
                nvidia.com/gpu: "1"
                memory: 16Gi
              requests:
                cpu: "4"
                memory: 8Gi
